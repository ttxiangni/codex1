{include file="admin/layout/header" /}

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">系统设置</h3>
                </div>
                <div class="card-body">
                    <form id="settingForm" method="post" action="{:url('admin/setting/save')}">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="site_name">网站名称</label>
                                    <input type="text" class="form-control" id="site_name" name="site_name" value="{$settings.site_name ?? ''}">
                                </div>
                                
                                <div class="form-group">
                                    <label for="site_url">网站URL</label>
                                    <input type="text" class="form-control" id="site_url" name="site_url" value="{$settings.site_url ?? ''}">
                                </div>
                                
                                <div class="form-group">
                                    <label for="site_description">网站描述</label>
                                    <textarea class="form-control" id="site_description" name="site_description" rows="3">{$settings.site_description ?? ''}</textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label for="site_keywords">网站关键词</label>
                                    <input type="text" class="form-control" id="site_keywords" name="site_keywords" value="{$settings.site_keywords ?? ''}" placeholder="用逗号分隔">
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="admin_email">管理员邮箱</label>
                                    <input type="email" class="form-control" id="admin_email" name="admin_email" value="{$settings.admin_email ?? ''}">
                                </div>
                                
                                <div class="form-group">
                                    <label for="cache_driver">缓存驱动</label>
                                    <select class="form-control" id="cache_driver" name="cache_driver">
                                        <option value="file" {if $settings.cache_driver == 'file'}selected{/if}>文件缓存</option>
                                        <option value="redis" {if $settings.cache_driver == 'redis'}selected{/if}>Redis缓存</option>
                                        <option value="memcached" {if $settings.cache_driver == 'memcached'}selected{/if}>Memcached</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="theme">默认主题</label>
                                    <select class="form-control" id="theme" name="theme">
                                        <option value="light" {if $settings.theme == 'light'}selected{/if}>浅色主题</option>
                                        <option value="dark" {if $settings.theme == 'dark'}selected{/if}>深色主题</option>
                                        <option value="auto" {if $settings.theme == 'auto'}selected{/if}>自动切换</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="timezone">时区</label>
                                    <input type="text" class="form-control" id="timezone" name="timezone" value="{$settings.timezone ?? 'Asia/Shanghai'}">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">保存设置</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$('#settingForm').submit(function(e) {
    e.preventDefault();
    
    $.post($(this).attr('action'), $(this).serialize(), function(data) {
        if (data.code == 1) {
            alert(data.msg);
            location.reload();
        } else {
            alert(data.msg);
        }
    });
});
</script>

{include file="admin/layout/footer" /}

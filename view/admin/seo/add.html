<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">ж·»еҠ SEOй…ҚзҪ®</h3>
                </div>
                <div class="card-body">
                    <form id="seoForm" method="post" action="{:url('admin/seo/add')}">

                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="page_type">йЎөйқўзұ»еһӢ</label>
                                    <select class="form-control" id="page_type" name="page_type" required>
                                        <option value="">иҜ·йҖүжӢ©йЎөйқўзұ»еһӢ</option>
                                        <option value="index">йҰ–йЎө</option>
                                        <option value="category">еҲҶзұ»йЎө</option>
                                        <option value="video">и§Ҷйў‘йЎө</option>
                                        <option value="article">ж–Үз« йЎө</option>
                                        <option value="actor">жј”е‘ҳйЎө</option>
                                        <option value="episode">еҲҶйӣҶйЎө</option>
                                        <option value="search">жҗңзҙўйЎө</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="page_key">йЎөйқўж ҮиҜҶ</label>
                                    <input type="text" class="form-control" id="page_key" name="page_key" placeholder="дҫӢеҰӮпјҡcategory_1 жҲ– article_123">
                                </div>
                                
                                <div class="form-group">
                                    <label for="title">ж Үйўҳ</label>
                                    <input type="text" class="form-control" id="title" name="title" required>
                                </div>
                                
                                <div class="form-group">
                                    <label for="keywords">е…ій”®иҜҚ</label>
                                    <input type="text" class="form-control" id="keywords" name="keywords" placeholder="з”ЁйҖ—еҸ·еҲҶйҡ”">
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="description">жҸҸиҝ°</label>
                                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label for="author">дҪңиҖ…</label>
                                    <input type="text" class="form-control" id="author" name="author">
                                </div>
                                
                                <div class="form-group">
                                    <label for="image">еӣҫзүҮURL</label>
                                    <input type="text" class="form-control" id="image" name="image" placeholder="з”ЁдәҺзӨҫдәӨеҲҶдә«зҡ„еӣҫзүҮ">
                                </div>
                                
                                <div class="form-group">
                                    <label for="url">йЎөйқўURL</label>
                                    <input type="text" class="form-control" id="url" name="url" placeholder="е®Ңж•ҙзҡ„йЎөйқўURL">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">дҝқеӯҳ</button>
                        <a href="{:url('admin/seo')}" class="btn btn-secondary">иҝ”еӣһ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$('#seoForm').submit(function(e) {
    e.preventDefault();
    
    $.post($(this).attr('action'), $(this).serialize(), function(data) {
        if (data.code == 1) {
            alert(data.msg);
            location.href = '{:url("admin/seo")}';
        } else {
            alert(data.msg);
        }
    });
});
</script>

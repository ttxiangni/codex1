{include file="admin/layout/header" /}

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">SEO管理</h3>
                    <div class="card-tools">
                        <a href="{:url('admin/seo/add')}" class="btn btn-primary btn-sm">
                            <i class="fas fa-plus"></i> 添加SEO配置
                        </a>
                    </div>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>页面类型</th>
                                <th>页面标识</th>
                                <th>标题</th>
                                <th>关键词</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {foreach $seos as $seo}
                            <tr>
                                <td>{$seo.id}</td>
                                <td>{$seo.page_type}</td>
                                <td>{$seo.page_key}</td>
                                <td>{$seo.title}</td>
                                <td>{$seo.keywords}</td>
                                <td>
                                    <a href="{:url('admin/seo/edit', ['id' => $seo.id])}" class="btn btn-sm btn-warning">
                                        <i class="fas fa-edit"></i> 编辑
                                    </a>
                                    <a href="javascript:void(0);" onclick="deleteSeo({$seo.id})" class="btn btn-sm btn-danger">
                                        <i class="fas fa-trash"></i> 删除
                                    </a>
                                </td>
                            </tr>
                            {/foreach}
                        </tbody>
                    </table>
                    
                    {$seos|raw}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function deleteSeo(id) {
    if (confirm('确定要删除这个SEO配置吗？')) {
        $.post('{:url("admin/seo/delete", ["id" => "__ID__"])}'.replace('__ID__', id), function(data) {
            if (data.code == 1) {
                alert(data.msg);
                location.reload();
            } else {
                alert(data.msg);
            }
        });
    }
}
</script>

{include file="admin/layout/footer" /}

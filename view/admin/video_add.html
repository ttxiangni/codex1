<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加视频</title>
</head>
<body>
    <h1>添加视频</h1>
    <form method="post">
        <label>标题: <input type="text" name="title" required></label><br>
        <label>内容: <textarea name="content"></textarea></label><br>
        <label>分类:
            <select name="category_id">
                {foreach $categories as $category}
                <option value="{$category.id}">{$category.name}</option>
                {/foreach}
            </select>
        </label><br>
        <label>视频URL: <input type="text" name="url"></label><br>
        <label>图片URL: <input type="text" name="image"></label><br>
        <label>状态: <input type="number" name="status" value="1"></label><br>
        <button type="submit">提交</button>
    </form>
</body>
</html>

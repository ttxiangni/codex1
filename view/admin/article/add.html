{include file="admin/layout/header" /}

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">添加文章</h3>
                </div>
                <div class="card-body">
                    <form id="articleForm" method="post" action="{:url('admin/article/add')}">
                        <div class="form-group">
                            <label for="title">标题</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="category_id">分类</label>
                            <select class="form-control" id="category_id" name="category_id">
                                <option value="">请选择分类</option>
                                {foreach $categories as $category}
                                <option value="{$category.id}">{$category.name}</option>
                                {/foreach}
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="author">作者</label>
                            <input type="text" class="form-control" id="author" name="author">
                        </div>
                        
                        <div class="form-group">
                            <label for="thumbnail">缩略图</label>
                            <input type="text" class="form-control" id="thumbnail" name="thumbnail" placeholder="图片URL">
                        </div>
                        
                        <div class="form-group">
                            <label for="description">描述</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="content">内容</label>
                            <textarea class="form-control" id="content" name="content" rows="10"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="keywords">关键词</label>
                            <input type="text" class="form-control" id="keywords" name="keywords" placeholder="用逗号分隔">
                        </div>
                        
                        <div class="form-group">
                            <label for="status">状态</label>
                            <select class="form-control" id="status" name="status">
                                <option value="1">发布</option>
                                <option value="0">草稿</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{:url('admin/article')}" class="btn btn-secondary">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$('#articleForm').submit(function(e) {
    e.preventDefault();
    
    $.post($(this).attr('action'), $(this).serialize(), function(data) {
        if (data.code == 1) {
            alert(data.msg);
            location.href = '{:url("admin/article")}';
        } else {
            alert(data.msg);
        }
    });
});
</script>

{include file="admin/layout/footer" /}

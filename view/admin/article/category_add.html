{include file="admin/layout/header" /}

<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">添加文章分类</h3>
                </div>
                <div class="card-body">
                    <form id="categoryForm" method="post" action="{:url('admin/article/category/add')}">
                        <div class="form-group">
                            <label for="name">分类名称</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="sort">排序</label>
                            <input type="number" class="form-control" id="sort" name="sort" value="0">
                        </div>
                        
                        <div class="form-group">
                            <label for="description">描述</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{:url('admin/article/category')}" class="btn btn-secondary">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$('#categoryForm').submit(function(e) {
    e.preventDefault();
    
    $.post($(this).attr('action'), $(this).serialize(), function(data) {
        if (data.code == 1) {
            alert(data.msg);
            location.href = '{:url("admin/article/category")}';
        } else {
            alert(data.msg);
        }
    });
});
</script>

{include file="admin/layout/footer" /}

<!-- 视频卡片组件 -->
<div class="col-lg-3 col-md-4 col-sm-6 mb-4">
    <div class="card video-card h-100">
        <img src="{$video.image}" class="card-img-top" alt="{$video.title}" style="height: 250px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
            <h6 class="card-title">
                <a href="{videoUrl video=$video /}" class="text-decoration-none text-dark" title="{$video.title}">
                    {$video.title|substr=0,20}{if strlen($video.title) > 20}...{/if}
                </a>
            </h6>
            <p class="card-text small text-muted flex-grow-1">{$video.content|substr=0,50}...</p>
            <div class="d-flex justify-content-between align-items-center mt-auto">
                <small class="text-muted">{$video.create_time|date='Y-m-d'}</small>
                <span class="badge bg-primary">{$video.category.name}</span>
            </div>
        </div>
    </div>
</div>

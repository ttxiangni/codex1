<!-- 分类卡片组件 -->
<div class="col-lg-2 col-md-3 col-sm-4 mb-3">
    <a href="{categoryUrl category=$category /}" class="text-decoration-none">
        <div class="card text-center h-100">
            <div class="card-body">
                <i class="fas fa-{$icon|default='tag'} fa-2x text-primary mb-2"></i>
                <h6 class="card-title">{$category.name}</h6>
            </div>
        </div>
    </a>
</div>

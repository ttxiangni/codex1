<!-- 分页组件 -->
{if $pagination && $pagination->lastPage() > 1}
<nav aria-label="分页导航" class="mt-4">
    <ul class="pagination justify-content-center">
        {if $pagination->currentPage() > 1}
        <li class="page-item">
            <a class="page-link" href="{$pagination->url($pagination->currentPage() - 1)}" aria-label="上一页">
                <span aria-hidden="true">&laquo;</span>
            </a>
        </li>
        {/if}

        {foreach $pagination->getUrlRange(1, $pagination->lastPage()) as $page => $url}
        <li class="page-item {if $page == $pagination->currentPage()}active{/if}">
            <a class="page-link" href="{$url}">{$page}</a>
        </li>
        {/foreach}

        {if $pagination->currentPage() < $pagination->lastPage()}
        <li class="page-item">
            <a class="page-link" href="{$pagination->url($pagination->currentPage() + 1)}" aria-label="下一页">
                <span aria-hidden="true">&raquo;</span>
            </a>
        </li>
        {/if}
    </ul>
</nav>
{/if}

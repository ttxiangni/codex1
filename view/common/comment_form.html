<!-- 评论表单组件 -->
<div class="mt-4 pt-3 border-top">
    <h6>{$title|default='发表评论'}</h6>
    <form id="comment-form">
        <div class="mb-3">
            <label for="comment-content" class="form-label">{$label|default='评论内容'}</label>
            <textarea class="form-control" id="comment-content" name="content" rows="3" placeholder="{$placeholder|default='写下你的评论...'}" required></textarea>
        </div>
        <input type="hidden" name="video_id" value="{$video_id}">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane me-2"></i>{$button_text|default='发表评论'}
        </button>
    </form>
</div>

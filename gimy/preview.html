<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiMy.tv - 影视模板预览</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="nav">
                <div class="logo">GiMy.tv</div>
                <ul class="nav-menu">
                    <li><a href="#">首页</a></li>
                    <li><a href="#">电影</a></li>
                    <li><a href="#">电视剧</a></li>
                    <li><a href="#">综艺</a></li>
                    <li><a href="#">动漫</a></li>
                </ul>
                <div class="nav-right">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    <a href="preview-login.html">登录</a>
                </div>
            </nav>
        </header>

        <main class="main">
            <section class="hero">
                <div class="hero-content">
                    <h1>热门推荐</h1>
                    <div class="hero-grid">
                        <div class="hero-item">
                            <img src="static/images/placeholder.jpg" alt="电影1">
                            <h3>电影标题1</h3>
                        </div>
                        <!-- 更多英雄项目 -->
                    </div>
                </div>
            </section>

            <section class="section">
                <h2>热播推荐</h2>
                <div class="grid">
                    <div class="card">
                        <img src="static/images/placeholder.jpg" alt="视频">
                        <h4>视频标题</h4>
                    </div>
                    <!-- 更多卡片 -->
                </div>
            </section>

            <section class="section">
                <h2>最近更新</h2>
                <div class="list">
                    <div class="list-item">
                        <span>视频标题 - 更新时间</span>
                    </div>
                    <!-- 更多列表项 -->
                </div>
            </section>

            <section class="section">
                <h2>分类楼层</h2>
                <div class="categories">
                    <div class="category">
                        <h3>电影</h3>
                        <div class="grid">
                            <!-- 电影卡片 -->
                        </div>
                    </div>
                    <div class="category">
                        <h3>电视剧</h3>
                        <div class="grid">
                            <!-- 电视剧卡片 -->
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2024 GiMy.tv. All rights reserved.</p>
        </footer>
    </div>

    <script src="static/js/main.js"></script>
</body>
</html>

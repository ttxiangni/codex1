<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - GiMy.tv</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="nav">
                <div class="logo">GiMy.tv</div>
                <ul class="nav-menu">
                    <li><a href="preview.html">首页</a></li>
                    <li><a href="#">收藏</a></li>
                    <li><a href="#">历史</a></li>
                </ul>
                <div class="nav-right">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    <span>用户名</span>
                </div>
            </nav>
        </header>

        <main class="main">
            <div class="user-center">
                <aside class="sidebar">
                    <ul>
                        <li><a href="#account">账号管理</a></li>
                        <li><a href="#likes">我的收藏</a></li>
                        <li><a href="#history">观看记录</a></li>
                        <li><a href="#orders">订单管理</a></li>
                    </ul>
                </aside>
                <div class="content">
                    <section id="account">
                        <h2>账号管理</h2>
                        <form>
                            <div class="form-group">
                                <label for="nickname">昵称</label>
                                <input type="text" id="nickname" name="nickname">
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱</label>
                                <input type="email" id="email" name="email">
                            </div>
                            <button type="submit" class="btn">保存</button>
                        </form>
                    </section>
                    <section id="orders">
                        <h2>订单管理</h2>
                        <p>暂无订单</p>
                    </section>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 GiMy.tv. All rights reserved.</p>
        </footer>
    </div>

    <script src="static/js/main.js"></script>
</body>
</html>
